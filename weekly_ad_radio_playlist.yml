name: Weekly AD Radio Playlist Update

on:
  schedule:
    # Runs at 06:00 UTC every Thursday (~1 AM ET, ~1 hour after the Wed night show ends)
    - cron: '0 6 * * Thu'
  # Allows manual trigger
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    env:
      CLIENT_ID: ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
      REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
      PLAYLIST_ID: ${{ secrets.PLAYLIST_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ad_radio_playlist script
        run: python ad_radio_playlist.py
